name: Build Roblox Dumper

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4

    - name: MSBuild'i Yapılandır
      uses: microsoft/setup-msbuild@v2

    - name: CMake Projesini Yapılandır (Configure)
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

    - name: Projeyi Derle (Build)
      run: |
        cmake --build build --config Release

    - name: Derlenen EXE'yi Artifact Olarak Yükle
      uses: actions/upload-artifact@v4
      with:
        name: roblox-dumper-release
        path: build/Release/*.exe
        
